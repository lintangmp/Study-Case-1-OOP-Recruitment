<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, #191627, #6D5DA1); min-height: 100vh; margin: 0; color: #E6ECFF">
    <div class="container py-5">
        <h1 class="text-center mb-4">🎬 Movie Search</h1>
        <p class="text-center mb-4">Cari film favorit kamu!</p>

        <div class="d-flex justify-content-center mb-4">
            <input id="searchInput" type="text" class="form-control w-50 me-2" placeholder="Cari film...">
            <button onclick="searchMovie()" class="btn btn-light">Search</button>
        </div>

        <h5 id="sectionTitle" class="mb-3">🏆 Highest Rated Movies on IMDb</h5>
        <div id="movies" class="row g-4"></div>
    </div>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
